<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CollegeNotes - Choose to study or upload notes for your selected subject.">
  <title>Subject — CollegeNotes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>CollegeNotes</h1>
    </a>
    <div class="nav-actions">
      <div class="nav-search">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search notes...">
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="btn-auth" id="authBtn">
        <i class="fas fa-user"></i>
        <span>Login</span>
      </button>
      <div class="user-profile hidden" id="userProfile">
        <div class="user-avatar">A</div>
        <span class="user-name">User</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Subject Header -->
    <section class="subject-header">
      <div class="subject-icon" id="subjectIcon">
        <i class="fas fa-atom"></i>
      </div>
      <h2 id="subjectTitle">Subject</h2>
      <p id="subjectDesc">Class 12 study resources</p>
    </section>

    <!-- Options Grid -->
    <div class="options-grid">
      <!-- Study Notes -->
      <div class="option-card" id="studyOption">
        <div class="option-icon"><i class="fas fa-book-open"></i></div>
        <h3 class="option-title">Study Notes</h3>
        <p class="option-desc">Browse and read notes by unit and chapter</p>
      </div>

      <!-- Upload Notes -->
      <div class="option-card" id="uploadOption">
        <div class="option-icon"><i class="fas fa-cloud-arrow-up"></i></div>
        <h3 class="option-title">Upload Notes</h3>
        <p class="option-desc">Share your notes with fellow students</p>
      </div>

      <!-- Back to Home -->
      <div class="option-card" id="backOption">
        <div class="option-icon"><i class="fas fa-house"></i></div>
        <h3 class="option-title">Back to Home</h3>
        <p class="option-desc">Return to subject selection</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Made with <span>❤</span> by CollegeNotes Team — © 2026 All rights reserved.</p>
  </footer>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="modal-close"><i class="fas fa-xmark"></i></button>
      <div id="authModalBody"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Processing...</div>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
