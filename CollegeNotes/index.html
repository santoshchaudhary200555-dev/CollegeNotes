<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CollegeNotes - Share and learn together. Access study notes for Physics, Chemistry, Mathematics, and Computer Science for Class 12 students.">
  <title>CollegeNotes — Share and Learn Together</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>CollegeNotes</h1>
    </a>
    <div class="nav-actions">
      <div class="nav-search">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search notes...">
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="btn-auth" id="authBtn">
        <i class="fas fa-user"></i>
        <span>Login</span>
      </button>
      <div class="user-profile hidden" id="userProfile">
        <div class="user-avatar">A</div>
        <span class="user-name">User</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Hero Section -->
    <section class="hero">
      <h2>Welcome to <span>CollegeNotes</span></h2>
      <p class="tagline">Share and Learn Together — Your one-stop destination for Class 12 study notes</p>
      <div class="hero-badges">
        <div class="hero-badge"><i class="fas fa-book-open"></i> 4 Subjects</div>
        <div class="hero-badge"><i class="fas fa-upload"></i> Upload & Share</div>
        <div class="hero-badge"><i class="fas fa-robot"></i> Auto OCR</div>
        <div class="hero-badge"><i class="fas fa-moon"></i> Dark Mode</div>
      </div>
    </section>

    <!-- Subject Cards -->
    <section class="subjects-section">
      <h3 class="section-title">Choose a Subject</h3>
      <div class="subjects-grid" id="subjectsGrid">
        <!-- Populated by JavaScript -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Made with <span>❤</span> by CollegeNotes Team — © 2026 All rights reserved.</p>
    <div style="margin-top: 5px; font-size: 0.8rem;">
      <a href="admin.html" style="color: var(--text-muted); text-decoration: none;"><i class="fas fa-shield-halved"></i> Admin Portal</a>
    </div>
  </footer>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="modal-close"><i class="fas fa-xmark"></i></button>
      <div id="authModalBody">
        <!-- Populated by JavaScript -->
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Processing...</div>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>
</html>
