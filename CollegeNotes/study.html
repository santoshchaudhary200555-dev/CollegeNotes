<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="CollegeNotes - Browse study notes by unit and chapter. Read notes shared by fellow students.">
  <title>Study Notes — CollegeNotes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <!-- Background Decoration -->
  <div class="bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
      <h1>CollegeNotes</h1>
    </a>
    <div class="nav-actions">
      <div class="nav-search">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search notes...">
      </div>
      <button class="icon-btn" id="themeToggle" title="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
      </button>
      <button class="btn-auth" id="authBtn">
        <i class="fas fa-user"></i>
        <span>Login</span>
      </button>
      <div class="user-profile hidden" id="userProfile">
        <div class="user-avatar">A</div>
        <span class="user-name">User</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Breadcrumb -->
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep"><i class="fas fa-chevron-right"></i></span>
      <span>Study Notes</span>
    </div>

    <!-- Study Container -->
    <div class="study-container">
      <!-- Unit & Chapter Selectors -->
      <div class="selectors-row">
        <div class="selector-group">
          <label><i class="fas fa-layer-group"></i> Select Unit</label>
          <select id="unitSelect">
            <option value="">Choose a unit...</option>
          </select>
        </div>
        <div class="selector-group">
          <label><i class="fas fa-bookmark"></i> Select Chapter</label>
          <select id="chapterSelect" disabled>
            <option value="">Choose a chapter...</option>
          </select>
        </div>
      </div>

      <!-- Notes Display Area -->
      <div id="notesContainer">
        <div class="empty-state">
          <div class="empty-icon">📖</div>
          <h3>Select a Unit & Chapter</h3>
          <p>Choose a unit and chapter above to view available study notes.</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Made with <span>❤</span> by CollegeNotes Team — © 2026 All rights reserved.</p>
  </footer>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <button class="modal-close"><i class="fas fa-xmark"></i></button>
      <div id="authModalBody"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Processing...</div>
    <div class="loading-progress">
      <div class="loading-progress-bar"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
</body>

</html>
